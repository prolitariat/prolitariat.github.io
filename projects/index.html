<!DOCTYPE html>
<html lang="en">
<head>

    <title>Projects | Brandon Noskoviak</title>
    <meta name="description" content="Projects by Brandon Noskoviak.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        charter: ['Charter', 'Georgia', 'Cambria', 'Times New Roman', 'serif'],
                    },
                }
            }
        }

    <style>
        @font-face {
            font-family: 'Charter';
            src: local('Charter'), local('Charter-Roman'), local('ITC Charter');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Charter';
            src: local('Charter Bold'), local('Charter-Bold'), local('ITC Charter Bold');
            font-weight: 700;
            font-style: normal;
        }
        body {
            background: linear-gradient(160deg, #e8eeff 0%, #dbeafe 20%, #f0e7ff 45%, #e0f2fe 70%, #ede9fe 100%);
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(199, 210, 254, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(191, 219, 254, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(221, 214, 254, 0.3) 0%, transparent 50%);
            z-index: -1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }
        .nav-link { transition: all 0.2s ease; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.5); }
        .section-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.08), transparent);
            margin: 28px 0;
        }
    </style>
    <link rel="alternate" type="application/rss+xml" title="Brandon Noskoviak" href="/feed.xml">
    <script>
        (function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
    </script>
    <script src="/shared/theme.js" defer></script>
</head>
